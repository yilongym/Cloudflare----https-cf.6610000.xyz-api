name: Auto Detect Cloudflare IPs

on:
  schedule:
    # 国际标准时间每4小时执行一次 (对应北京时间 02:00, 06:00, 10:00, 14:00, 18:00, 22:00)
    - cron: '0 */4 * * *'
  workflow_dispatch: # 允许您在GitHub页面上手动点击按钮立即触发执行

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run IP Detection Script
      run: |
        python update_ips.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 检查文件是否有变动，有变动则提交修改
        if [ -f "cloudflare_proxies.txt" ]; then
          git add cloudflare_proxies.txt
          if ! git diff --cached --quiet; then
            git commit -m "自动更新: 优选IP列表已更新 ($(date +'%Y-%m-%d %H:%M:%S'))"
            git push
          else
            echo "数据未发生变化，无需提交"
          fi
        fi
